<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Video Downloader Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #ff6b35;
    --text: #e8e8f0;
    --muted: #666680;
    --danger: #ff4444;
    --warning: #ffaa00;
    --premium: #ffd700;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }

  /* LOGIN */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: radial-gradient(ellipse at center, #0d1117 0%, #0a0a0f 100%);
  }
  .login-box {
    border: 1px solid var(--accent);
    padding: 48px;
    width: 380px;
    position: relative;
    background: var(--surface);
  }
  .login-box::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px; right: -1px; bottom: -1px;
    background: linear-gradient(135deg, var(--accent), transparent, var(--accent2));
    z-index: -1;
    opacity: 0.3;
  }
  .login-box h1 {
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 8px;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
  }
  .login-box p { color: var(--muted); margin-bottom: 32px; font-size: 13px; }
  .login-box input {
    width: 100%;
    padding: 14px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box button {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #000;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 15px;
    border: none;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .login-box button:hover { opacity: 0.85; }
  .login-error { color: var(--danger); font-size: 13px; margin-top: 12px; display: none; }

  /* MAIN */
  #main { display: none; }
  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }
  header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    color: var(--accent);
  }
  header span { color: var(--muted); font-size: 13px; }
  .logout-btn {
    padding: 8px 16px;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    transition: all 0.2s;
  }
  .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

  .container { max-width: 1200px; margin: 0 auto; padding: 32px; }

  /* STATS */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
    position: relative;
    overflow: hidden;
  }
  .stat-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }
  .stat-card.premium::after { background: var(--premium); }
  .stat-card.downloads::after { background: var(--accent2); }
  .stat-card.danger::after { background: var(--danger); }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }
  .stat-value { font-size: 36px; font-weight: 800; font-family: 'Space Mono', monospace; }

  /* SECTIONS */
  .section { margin-bottom: 40px; }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .section-title { font-size: 18px; font-weight: 800; }

  /* ACTIONS */
  .actions-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }
  .action-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
  }
  .action-card h3 { font-size: 14px; margin-bottom: 16px; color: var(--accent); font-family: 'Space Mono', monospace; }
  .action-card input, .action-card textarea {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    margin-bottom: 10px;
    outline: none;
  }
  .action-card input:focus, .action-card textarea:focus { border-color: var(--accent); }
  .action-card textarea { resize: vertical; min-height: 80px; }
  .btn {
    padding: 10px 20px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    border: none;
    cursor: pointer;
    transition: opacity 0.2s;
    width: 100%;
  }
  .btn:hover { opacity: 0.85; }
  .btn-green { background: var(--accent); color: #000; }
  .btn-red { background: var(--danger); color: #fff; }
  .btn-orange { background: var(--accent2); color: #fff; }
  .btn-gold { background: var(--premium); color: #000; }

  /* USERS TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: var(--surface); }
  th {
    padding: 12px 16px;
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    font-family: 'Space Mono', monospace;
  }
  td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .badge {
    display: inline-block;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 700;
    font-family: 'Space Mono', monospace;
  }
  .badge-premium { background: rgba(255,215,0,0.15); color: var(--premium); border: 1px solid var(--premium); }
  .badge-free { background: rgba(102,102,128,0.15); color: var(--muted); border: 1px solid var(--border); }
  .badge-banned { background: rgba(255,68,68,0.15); color: var(--danger); border: 1px solid var(--danger); }
  .action-btns { display: flex; gap: 8px; }
  .action-btns button {
    padding: 5px 12px;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    border: none;
    cursor: pointer;
    font-weight: 700;
  }
  .search-bar {
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    outline: none;
    width: 280px;
  }
  .search-bar:focus { border-color: var(--accent); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 32px; right: 32px;
    padding: 14px 24px;
    background: var(--accent);
    color: #000;
    font-weight: 700;
    font-size: 14px;
    z-index: 9999;
    transform: translateY(100px);
    transition: transform 0.3s;
    pointer-events: none;
  }
  .toast.show { transform: translateY(0); }
  .toast.error { background: var(--danger); color: #fff; }

  .refresh-btn {
    padding: 8px 16px;
    border: 1px solid var(--accent);
    background: none;
    color: var(--accent);
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>ADMIN_ACCESS</h1>
    <p>Video Downloader Bot — Control Panel</p>
    <input type="password" id="pwd-input" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">GALI →</button>
    <div class="login-error" id="login-error">❌ Password-ka waa khalad</div>
  </div>
</div>

<!-- MAIN PANEL -->
<div id="main">
  <header>
    <h1>⚡ ADMIN PANEL</h1>
    <span id="last-refresh">Loading...</span>
    <button class="logout-btn" onclick="doLogout()">Logout</button>
  </header>

  <div class="container">

    <!-- STATS -->
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Users Guud</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card premium">
        <div class="stat-label">Premium</div>
        <div class="stat-value" id="stat-premium">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Free Users</div>
        <div class="stat-value" id="stat-free">—</div>
      </div>
      <div class="stat-card downloads">
        <div class="stat-label">Downloads Guud</div>
        <div class="stat-value" id="stat-downloads">—</div>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="actions-grid">
      <!-- Approve Premium -->
      <div class="action-card">
        <h3>⭐ APPROVE PREMIUM</h3>
        <input type="text" id="approve-id" placeholder="User ID">
        <input type="number" id="approve-days" placeholder="Maalmood (30)" value="30">
        <button class="btn btn-gold" onclick="approvePremium()">APPROVE</button>
      </div>

      <!-- Revoke Premium -->
      <div class="action-card">
        <h3>❌ REVOKE PREMIUM</h3>
        <input type="text" id="revoke-id" placeholder="User ID">
        <button class="btn btn-red" onclick="revokePremium()">REVOKE</button>
      </div>

      <!-- Ban User -->
      <div class="action-card">
        <h3>🚫 BAN USER</h3>
        <input type="text" id="ban-id" placeholder="User ID">
        <button class="btn btn-red" onclick="banUser()">BAN</button>
      </div>

      <!-- Broadcast -->
      <div class="action-card">
        <h3>📢 BROADCAST</h3>
        <textarea id="broadcast-msg" placeholder="Fariinta aad u diri rabto dhammaan users-ka..."></textarea>
        <button class="btn btn-orange" onclick="sendBroadcast()">DIR DHAMMAAN</button>
      </div>
    </div>

    <!-- USERS TABLE -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">👥 Users</div>
        <div style="display:flex;gap:12px;align-items:center">
          <input class="search-bar" type="text" placeholder="Raadi user..." oninput="filterUsers(this.value)">
          <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Username</th>
              <th>Nooc</th>
              <th>Premium Dhacaya</th>
              <th>Downloads</th>
              <th>Ku Biirtay</th>
              <th>Ficil</th>
            </tr>
          </thead>
          <tbody id="users-tbody"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const ADMIN_PASSWORD = "admin123"; // ← HALKAN BEDDEL
  let allUsers = [];

  function doLogin() {
    const pwd = document.getElementById('pwd-input').value;
    if (pwd === ADMIN_PASSWORD) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('main').style.display = 'block';
      loadData();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  }

  function doLogout() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('main').style.display = 'none';
    document.getElementById('pwd-input').value = '';
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.className = 'toast', 3000);
  }

  async function loadData() {
    try {
      const res = await fetch('/api/users');
      const data = await res.json();
      allUsers = data.users;
      renderStats(data);
      renderUsers(allUsers);
      document.getElementById('last-refresh').textContent = 'Updated: ' + new Date().toLocaleTimeString();
    } catch(e) {
      showToast('Server-ka xiriir la waayay', true);
    }
  }

  function renderStats(data) {
    document.getElementById('stat-total').textContent = data.total;
    document.getElementById('stat-premium').textContent = data.premium;
    document.getElementById('stat-free').textContent = data.total - data.premium;
    document.getElementById('stat-downloads').textContent = data.totalDownloads;
  }

  function renderUsers(users) {
    const tbody = document.getElementById('users-tbody');
    tbody.innerHTML = '';
    users.forEach(u => {
      const isPremium = u.isPremium && u.premiumExpiry && Date.now() < u.premiumExpiry;
      const expiry = u.premiumExpiry ? new Date(u.premiumExpiry).toLocaleDateString() : '—';
      const joined = new Date(u.joinedAt).toLocaleDateString();
      tbody.innerHTML += `
        <tr>
          <td><code style="color:var(--accent);font-family:'Space Mono',monospace">${u.id}</code></td>
          <td>@${u.username || '—'}</td>
          <td>
            <span class="badge ${u.banned ? 'badge-banned' : isPremium ? 'badge-premium' : 'badge-free'}">
              ${u.banned ? 'BANNED' : isPremium ? '⭐ PREMIUM' : 'FREE'}
            </span>
          </td>
          <td style="color:var(--muted)">${isPremium ? expiry : '—'}</td>
          <td style="font-family:'Space Mono',monospace">${u.totalDownloads || 0}</td>
          <td style="color:var(--muted)">${joined}</td>
          <td>
            <div class="action-btns">
              ${!isPremium ? `<button style="background:var(--premium);color:#000" onclick="quickApprove('${u.id}')">+Premium</button>` : `<button style="background:var(--danger);color:#fff" onclick="quickRevoke('${u.id}')">Revoke</button>`}
              ${!u.banned ? `<button style="background:var(--danger);color:#fff" onclick="quickBan('${u.id}')">Ban</button>` : ''}
            </div>
          </td>
        </tr>`;
    });
  }

  function filterUsers(q) {
    const filtered = allUsers.filter(u =>
      u.id.toString().includes(q) ||
      (u.username && u.username.toLowerCase().includes(q.toLowerCase()))
    );
    renderUsers(filtered);
  }

  async function approvePremium() {
    const id = document.getElementById('approve-id').value.trim();
    const days = document.getElementById('approve-days').value || 30;
    if (!id) return showToast('User ID geli', true);
    await apiCall('/api/approve', { userId: id, days: parseInt(days) });
    document.getElementById('approve-id').value = '';
    loadData();
  }

  async function revokePremium() {
    const id = document.getElementById('revoke-id').value.trim();
    if (!id) return showToast('User ID geli', true);
    await apiCall('/api/revoke', { userId: id });
    document.getElementById('revoke-id').value = '';
    loadData();
  }

  async function banUser() {
    const id = document.getElementById('ban-id').value.trim();
    if (!id) return showToast('User ID geli', true);
    await apiCall('/api/ban', { userId: id });
    document.getElementById('ban-id').value = '';
    loadData();
  }

  async function sendBroadcast() {
    const msg = document.getElementById('broadcast-msg').value.trim();
    if (!msg) return showToast('Fariin geli', true);
    if (!confirm(`Dhammaan users-ka ma u dirtaa: "${msg.substring(0,50)}..."`)) return;
    await apiCall('/api/broadcast', { message: msg });
    document.getElementById('broadcast-msg').value = '';
  }

  async function quickApprove(id) {
    await apiCall('/api/approve', { userId: id, days: 30 });
    loadData();
  }

  async function quickRevoke(id) {
    await apiCall('/api/revoke', { userId: id });
    loadData();
  }

  async function quickBan(id) {
    if (!confirm('User-kan ban-gareeysaa?')) return;
    await apiCall('/api/ban', { userId: id });
    loadData();
  }

  async function apiCall(url, body) {
    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (data.ok) showToast('✅ ' + (data.message || 'Waa la fuliyay'));
      else showToast('❌ ' + data.error, true);
    } catch(e) {
      showToast('Server-ka xiriir la waayay', true);
    }
  }
</script>
</body>
</html>
